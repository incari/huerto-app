version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - garden-data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/garden.db
    restart: unless-stopped

volumes:
  garden-data:
    driver: local

